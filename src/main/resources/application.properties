spring.application.name=plantcare

# Server port
# Nongsaro API Key (발급: https://api.nongsaro.go.kr)
api.nongsaro.key=20260715DP2AFQDNRS21NRRKCRDWQ
server.port=7777
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# DataSource MySQL
spring.datasource.url=jdbc:log4jdbc:mysql://localhost:3306/plantcare?serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=plantcare
spring.datasource.password=plantcare
spring.datasource.driver-class-name=net.sf.log4jdbc.sql.jdbcapi.DriverSpy

# View resolver (JSP)
spring.mvc.view.prefix=/views/
spring.mvc.view.suffix=.jsp

# Multipart settings
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# MyBatis Settings
mybatis.type-aliases-package=kr.ac.tukorea.plantcare
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.return-instance-for-empty-row=true
